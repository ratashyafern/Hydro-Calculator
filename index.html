<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Online Calculator | Sudin SDA JS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { 
            --primary: #0f172a; 
            --accent: #f59e0b; 
            --bg: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background: var(--bg);
            color: var(--primary);
        }

        /* 1. LEMBAR KODE VERIFIKASI */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--primary); display: flex; justify-content: center;
            align-items: center; z-index: 10000; transition: 0.5s;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 32px;
            text-align: center; width: 350px; border-top: 8px solid var(--accent);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-box input {
            width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #e2e8f0;
            border-radius: 16px; text-align: center; font-size: 1.5rem; letter-spacing: 8px;
            outline: none; transition: 0.3s;
        }
        .login-box input:focus { border-color: var(--accent); }

        /* 2. HALAMAN AWAL */
        #main-header { 
            background: var(--primary); color: white; padding: 80px 20px; 
            text-align: center; border-bottom: 8px solid var(--accent); 
        }
        .header-big { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin: 0; }
        .header-small { font-size: 1.1rem; color: var(--accent); font-weight: 600; margin-top: 5px; opacity: 0.9; }

        /* 3. MENU CARDS */
        .menu-container { 
            max-width: 1100px; margin: -50px auto 50px auto; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; padding: 0 20px;
        }
        .menu-card {
            background: white; border-radius: 28px; padding: 35px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column;
        }
        .menu-card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px rgba(15, 23, 42, 0.15); border-color: var(--accent); }
        .icon-circle { 
            width: 60px; height: 60px; background: var(--primary); 
            border-radius: 18px; display: flex; align-items: center; 
            justify-content: center; font-size: 1.8rem; margin-bottom: 25px; color: var(--accent);
        }
        .btn-open { 
            background: var(--primary); color: white; padding: 14px; 
            border-radius: 12px; font-weight: 800; text-align: center; 
            font-size: 0.8rem; letter-spacing: 1px; margin-top: auto;
        }

        /* COMING SOON STYLE */
        .soon { opacity: 0.6; cursor: not-allowed; filter: grayscale(1); }
        .soon:hover { transform: none; border-color: transparent; }
        .badge { background: #e2e8f0; color: #64748b; padding: 4px 12px; border-radius: 100px; font-size: 10px; font-weight: 800; width: fit-content; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/Logo_DKI_Jakarta.svg" class="h-16 mx-auto mb-4">
        <h3 class="font-extrabold text-xl text-slate-800">Verifikasi Akses</h3>
        <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-bold">SDA Online Calculator</p>
        <input type="password" id="pass-field" maxlength="4" placeholder="••••">
        <button class="w-full bg-[#0f172a] text-white p-4 rounded-2xl font-black hover:bg-slate-800 transition-all" onclick="verifikasi()">MASUK PANEL</button>
        <p id="err-msg" class="text-red-500 text-[10px] font-bold mt-4 hidden">KODE SALAH! SILAHKAN COBA LAGI</p>
    </div>
</div>

<div id="content-wrapper" style="filter: blur(20px); pointer-events: none;">
    
    <header id="main-header">
        <h1 class="header-big italic">SDA Online Calculator</h1>
        <p class="header-small uppercase">Seksi Perencanaan Suku Dinas Sumber Daya Air Jakarta Selatan</p>
